services:
  db:
    image: postgres:17
    container_name: skilltree_db
    environment:
      POSTGRES_USER: skilltree_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skilltree_db_dev
    ports:
      - "5432:5432"
    volumes:
      - skilltree_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilltree_user -d skilltree_db_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  skilltree_db_data:
